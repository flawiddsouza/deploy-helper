- name: Template with become via doas
  hosts: test
  vars:
    owner: root
  tasks:
    - name: Render template as root via doas
      become: true
      become_method: doas
      template:
        src: template-with-become-doas.src.j2
        dest: /tmp/deploy-helper-test-template-become-doas

    - name: Verify file is owned by root
      become: true
      become_method: doas
      shell: stat -c '%U' /tmp/deploy-helper-test-template-become-doas

    - name: Read content
      become: true
      become_method: doas
      shell: cat /tmp/deploy-helper-test-template-become-doas
